name: Keep MyQuiza API awake

# Pings the MyQuiza API /health endpoint to prevent the Render free-tier
# instance from sleeping (it spins down after ~15 min of inactivity).
# Vercel Cron can't do this on the Hobby plan (daily-only), so we use
# GitHub Actions, which supports short intervals and is plan-independent.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (GitHub may delay a few min)
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MyQuiza /health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://myquiza-api.onrender.com/health)
          echo "MyQuiza /health responded with HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Unexpected status $code from MyQuiza /health"
          fi
